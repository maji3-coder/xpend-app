<!DOCTYPE html>

<div id="app">
  <h1>Xpend Tracker</h1>

    <button onclick="handleLogin()">Sign In</button>
  </div>
</div>

<script>
// 1. INITIALIZE SUPABASE
const SUPABASE_URL = 'https://fydijvhjvukyrqcxacau.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5ZGlqdmhqdnVreXJxY3hhY2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjU2NzIsImV4cCI6MjA5MzU0MTY3Mn0.Ef2ZLxU3G9p2UHRxsRrkWyLi9-nrrrjDmumXyjO7lsw';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 2. SECURE API BRIDGE
async function api(method, path, body) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    
    if (path === '/api/expenses') {
      if (method === 'GET') {
        const { data, error } = await supabase.from('expenses').select('*');
        if (error) throw error;
        return data;
      }
      
      if (method === 'POST') {
        const expenseData = { ...body, user_id: session?.user?.id };
        const { data, error } = await supabase.from('expenses').insert(expenseData);
        if (error) throw error;
        return data;
      }
    }
  } catch (err) {
    console.error("API Error:", err);
    throw err;
  }
}

// 3. LOGIN LOGIC
async function handleLogin() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('password-input').value;
  
  console.log("Attempting login for:", email);
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    console.error("Login failed:", error.message);
    alert("Login failed: " + error.message);
  } else {
    console.log("Logged in successfully!");
    location.reload(); 
  }
}

// 4. CHECK AUTH ON LOAD
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabase.auth.getSession();

});
